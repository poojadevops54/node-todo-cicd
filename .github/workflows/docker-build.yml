name: Deploy Node Todo App using Private Runner

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      imageTag:
        description: "Docker Image Tag"
        required: true
        default: "latest"

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Input Parameter
        run: |
          echo "Image Tag: ${{ github.event.inputs.imageTag || 'latest' }}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t node/app:${{ github.event.inputs.imageTag || 'latest' }} .

      - name: Tag Docker Image
        run: |
          docker tag node/app:${{ github.event.inputs.imageTag || 'latest' }} \
          577002943781.dkr.ecr.eu-north-1.amazonaws.com/node/app:${{ github.event.inputs.imageTag || 'latest' }}

      - name: Push Docker Image to Amazon ECR
        run: |
          docker push 577002943781.dkr.ecr.eu-north-1.amazonaws.com/node/app:${{ github.event.inputs.imageTag || 'latest' }}

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster NodeCluster \
            --service node-todo-app-td-service-hdy5v8sf \
            --force-new-deployment \
            --region eu-north-1
