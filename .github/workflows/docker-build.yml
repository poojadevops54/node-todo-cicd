name: Build Node Todo Docker Image

on:
  push:
    branches:
      - main


jobs:

  docker-build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Build Docker Image
      run: |
        docker build -t node-todo-app:latest .


    - name: Check Docker Image
      run: |
        docker images
